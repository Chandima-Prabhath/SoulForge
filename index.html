<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SoulForge</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e8e8f0;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      #hud {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(10, 10, 20, 0.65);
        backdrop-filter: blur(8px);
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 12px;
        line-height: 1.6;
        font-family: "SF Mono", "Monaco", "Consolas", monospace;
        pointer-events: none;
        user-select: none;
        min-width: 220px;
      }
      #hud .hud-title {
        color: #ffb86c;
        font-weight: 600;
        margin-bottom: 4px;
        letter-spacing: 0.04em;
      }
      #hud .hud-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      #hud .hud-label {
        color: #8888a0;
      }
      #hud .hud-value {
        color: #f8f8ff;
      }
      #hud .hud-help {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid rgba(255,255,255,0.08);
        color: #8888a0;
        font-size: 11px;
      }
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #ffb86c;
        font-size: 14px;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading">Summoning the Sanctum...</div>
      <div id="hud" style="display:none;">
        <div class="hud-title">SOULFORGE — Phase 3</div>
        <div class="hud-row"><span class="hud-label">Realm</span><span class="hud-value" id="hud-realm">Verdant Rift (Prototype)</span></div>
        <div class="hud-row"><span class="hud-label">FPS</span><span class="hud-value" id="hud-fps">--</span></div>
        <div class="hud-row"><span class="hud-label">Tile</span><span class="hud-value" id="hud-tile">--, --</span></div>
        <div class="hud-row"><span class="hud-label">Pixel</span><span class="hud-value" id="hud-pixel">--, --</span></div>
        <div class="hud-row"><span class="hud-label">HP</span><span class="hud-value" id="hud-hp">--</span></div>
        <div style="margin-top:2px; width:100%; height:6px; background:#222230; border-radius:3px; overflow:hidden;">
          <div id="hud-hp-bar" style="width:100%; height:100%; background:#40ff40; transition: width 0.15s;"></div>
        </div>
        <div style="margin-top:8px; padding-top:6px; border-top:1px solid rgba(255,255,255,0.08);">
          <div style="font-size:10px; color:#8888a0; letter-spacing:0.05em; margin-bottom:4px;">SKILLS</div>
          <div id="hud-slot0" style="margin-bottom:4px;">
            <div class="hud-row">
              <span class="hud-value" style="font-size:11px;"><span id="hud-slot0-key" style="color:#ffb86c; font-weight:bold;">1</span> <span id="hud-slot0-name">--</span></span>
              <span class="hud-value" style="font-size:11px;" id="hud-slot0-cd">--</span>
            </div>
            <div style="margin-top:1px; width:100%; height:3px; background:#222230; border-radius:2px; overflow:hidden;">
              <div id="hud-slot0-bar" style="width:100%; height:100%; background:#ffb86c; transition: width 0.05s;"></div>
            </div>
          </div>
          <div id="hud-slot1" style="margin-bottom:4px;">
            <div class="hud-row">
              <span class="hud-value" style="font-size:11px;"><span id="hud-slot1-key" style="color:#ffb86c; font-weight:bold;">2</span> <span id="hud-slot1-name">--</span></span>
              <span class="hud-value" style="font-size:11px;" id="hud-slot1-cd">--</span>
            </div>
            <div style="margin-top:1px; width:100%; height:3px; background:#222230; border-radius:2px; overflow:hidden;">
              <div id="hud-slot1-bar" style="width:100%; height:100%; background:#ffb86c; transition: width 0.05s;"></div>
            </div>
          </div>
          <div id="hud-slot2" style="margin-bottom:4px;">
            <div class="hud-row">
              <span class="hud-value" style="font-size:11px;"><span id="hud-slot2-key" style="color:#ffb86c; font-weight:bold;">3</span> <span id="hud-slot2-name">--</span></span>
              <span class="hud-value" style="font-size:11px;" id="hud-slot2-cd">--</span>
            </div>
            <div style="margin-top:1px; width:100%; height:3px; background:#222230; border-radius:2px; overflow:hidden;">
              <div id="hud-slot2-bar" style="width:100%; height:100%; background:#ffb86c; transition: width 0.05s;"></div>
            </div>
          </div>
          <div id="hud-slot3" style="margin-bottom:4px;">
            <div class="hud-row">
              <span class="hud-value" style="font-size:11px;"><span id="hud-slot3-key" style="color:#ffb86c; font-weight:bold;">4</span> <span id="hud-slot3-name">--</span></span>
              <span class="hud-value" style="font-size:11px;" id="hud-slot3-cd">--</span>
            </div>
            <div style="margin-top:1px; width:100%; height:3px; background:#222230; border-radius:2px; overflow:hidden;">
              <div id="hud-slot3-bar" style="width:100%; height:100%; background:#ffb86c; transition: width 0.05s;"></div>
            </div>
          </div>
        </div>
        <div class="hud-row" style="margin-top:6px;"><span class="hud-label">Enemies</span><span class="hud-value" id="hud-enemies">--</span></div>
        <div style="margin-top:8px; padding-top:6px; border-top:1px solid rgba(255,255,255,0.08);">
          <div style="font-size:10px; color:#8888a0; letter-spacing:0.05em; margin-bottom:4px;">DEVOUR</div>
          <div class="hud-row"><span class="hud-value" style="font-size:11px;"><span style="color:#d0a0ff; font-weight:bold;">E</span> [Devour]</span><span class="hud-value" style="font-size:11px;" id="hud-devour-cd">--</span></div>
          <div style="margin-top:1px; width:100%; height:3px; background:#222230; border-radius:2px; overflow:hidden;">
            <div id="hud-devour-bar" style="width:100%; height:100%; background:#d0a0ff; transition: width 0.05s;"></div>
          </div>
          <div class="hud-row" style="margin-top:3px;"><span class="hud-label">Devoured</span><span class="hud-value" id="hud-devour-count">0</span></div>
          <div id="hud-unlocked" style="margin-top:2px; font-size:10px; color:#8888a0; line-height:1.4;">--</div>
        </div>
        <div class="hud-help" style="margin-top:6px;">
          WASD: move &nbsp;|&nbsp; L-click: walk<br>
          R-click: slot 1 &nbsp;|&nbsp; 1-4: slots<br>
          E: [Devour] &nbsp;|&nbsp; R: Sanctum
        </div>
      </div>
      <div id="hud-voice" style="position:absolute; top:30px; left:50%; transform:translateX(-50%); background:rgba(10,10,20,0.85); backdrop-filter:blur(8px); padding:8px 20px; border-radius:6px; border:1px solid rgba(255,184,108,0.4); color:#ffb86c; font-size:14px; font-weight:600; letter-spacing:0.03em; pointer-events:none; display:none; text-align:center; min-width:200px;"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
