<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SoulForge</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e8e8f0;
      }
      /* Allow text selection only in input fields */
      input, textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        touch-action: none;
      }

      /* ═══════════════════════════════════════════════════════════════
         GAME HUD — minimal, non-blocking, game-style
         ═══════════════════════════════════════════════════════════════ */

      /* All HUD elements: no pointer events by default, no text selection */
      .hud-element {
        position: absolute;
        pointer-events: none;
        user-select: none;
        z-index: 100;
      }

      /* ── Top-Left: Health Bar + Realm Info ────────────────────────── */
      #hud-topleft {
        top: 16px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #hud-realm-info {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #ffb86c;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      }

      #hud-realm-info .depth-badge {
        background: rgba(255,184,108,0.2);
        border: 1px solid rgba(255,184,108,0.4);
        border-radius: 4px;
        padding: 2px 8px;
        font-size: 11px;
      }

      #hud-health-container {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #hud-health-bar {
        width: 180px;
        height: 14px;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 7px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      }

      #hud-health-fill {
        height: 100%;
        background: linear-gradient(90deg, #ff2040 0%, #ff6080 50%, #40ff80 100%);
        background-size: 200% 100%;
        background-position: 100% 0;
        transition: width 0.2s ease, background-position 0.2s ease;
        border-radius: 6px;
      }

      #hud-health-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 10px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        font-family: "SF Mono", monospace;
      }

      /* ── Top-Right: Devour Progress (compact) ─────────────────────── */
      #hud-topright {
        top: 16px;
        right: 16px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }

      #hud-devour-count {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #d0a0ff;
        font-weight: 600;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      }

      #hud-devour-count .devour-icon {
        font-size: 14px;
      }

      #hud-unlocked {
        font-size: 10px;
        color: rgba(200,200,220,0.6);
        text-align: right;
        line-height: 1.4;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        max-width: 200px;
      }

      /* ── Top-Center: Voice of the World (floating text, no box) ───── */
      #hud-voice {
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        color: #ffb86c;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-align: center;
        text-shadow: 0 2px 12px rgba(0,0,0,0.9), 0 0 20px rgba(255,184,108,0.3);
        display: none;
        transition: opacity 0.5s ease;
        max-width: 80vw;
      }

      /* ── Bottom-Center: Skill Bar (like MOBA games) ───────────────── */
      #hud-skillbar {
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }

      .skill-slot {
        width: 56px;
        height: 56px;
        background: rgba(10,10,20,0.7);
        border: 2px solid rgba(255,255,255,0.15);
        border-radius: 10px;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(4px);
        transition: border-color 0.15s, transform 0.1s;
      }

      .skill-slot.ready {
        border-color: rgba(255,184,108,0.5);
      }

      .skill-slot.empty {
        opacity: 0.3;
        border-style: dashed;
      }

      .skill-slot .skill-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 24px;
        opacity: 0.9;
      }

      .skill-slot .skill-key {
        position: absolute;
        top: 2px;
        left: 4px;
        font-size: 10px;
        font-weight: 700;
        color: #ffb86c;
        text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        font-family: "SF Mono", monospace;
      }

      .skill-slot .skill-name {
        position: absolute;
        bottom: 2px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 8px;
        color: rgba(255,255,255,0.7);
        text-align: center;
        white-space: nowrap;
        text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        max-width: 52px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .skill-slot .cooldown-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.7);
        transition: height 0.05s linear;
        pointer-events: none;
      }

      .skill-slot .cooldown-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        font-family: "SF Mono", monospace;
        display: none;
      }

      /* ── Bottom-Left: Devour Skill Button ─────────────────────────── */
      #hud-devour-btn {
        bottom: 20px;
        left: 20px;
        width: 64px;
        height: 64px;
        background: rgba(40,20,60,0.7);
        border: 2px solid rgba(208,160,255,0.4);
        border-radius: 50%;
        position: absolute;
        overflow: hidden;
        backdrop-filter: blur(4px);
        pointer-events: none;
      }

      #hud-devour-btn .devour-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 28px;
        color: #d0a0ff;
        text-shadow: 0 0 10px rgba(208,160,255,0.5);
      }

      #hud-devour-btn .devour-key {
        position: absolute;
        top: 4px;
        right: 6px;
        font-size: 10px;
        font-weight: 700;
        color: #d0a0ff;
        text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        font-family: "SF Mono", monospace;
      }

      #hud-devour-btn .cooldown-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.7);
        transition: height 0.05s linear;
      }

      #hud-devour-btn .cooldown-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        font-family: "SF Mono", monospace;
        display: none;
      }

      /* ── Bottom-Right: Sanctum Button ─────────────────────────────── */
      #hud-sanctum-btn {
        bottom: 20px;
        right: 20px;
        width: 48px;
        height: 48px;
        background: rgba(40,40,55,0.7);
        border: 1px solid rgba(255,184,108,0.3);
        border-radius: 8px;
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: #ffb86c;
        backdrop-filter: blur(4px);
        pointer-events: none;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      }

      #hud-sanctum-btn .sanctum-key {
        position: absolute;
        top: 2px;
        right: 4px;
        font-size: 9px;
        color: #ffb86c;
        font-family: "SF Mono", monospace;
        font-weight: 700;
      }

      /* ── Debug Overlay (toggle with F3) ───────────────────────────── */
      #hud-debug {
        top: 50px;
        left: 16px;
        background: rgba(0,0,0,0.7);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 10px;
        font-family: "SF Mono", monospace;
        color: #88ff88;
        line-height: 1.6;
        display: none;
        border: 1px solid rgba(136,255,136,0.2);
      }

      #hud-debug .debug-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      #hud-debug .debug-label {
        color: #8888a0;
      }

      /* ── Death Screen ─────────────────────────────────────────────── */
      #hud-death {
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(ellipse at center, rgba(40,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%);
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 200;
      }

      #hud-death .death-text {
        font-size: 48px;
        color: #ff4040;
        font-weight: bold;
        letter-spacing: 0.2em;
        text-shadow: 0 0 30px rgba(255,64,64,0.5);
        margin-bottom: 16px;
      }

      #hud-death .death-hint {
        font-size: 16px;
        color: #8888a0;
        letter-spacing: 0.1em;
      }

      #hud-death .death-hint .key {
        color: #ffb86c;
        font-weight: bold;
      }

      /* ── Loading ──────────────────────────────────────────────────── */
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #ffb86c;
        font-size: 14px;
        letter-spacing: 0.1em;
      }

      /* ── Mobile Responsive ────────────────────────────────────────── */
      @media (max-width: 768px) {
        #hud-topleft {
          top: 10px;
          left: 10px;
        }
        #hud-health-bar {
          width: 120px;
          height: 12px;
        }
        #hud-topright {
          top: 10px;
          right: 10px;
        }
        #hud-unlocked {
          max-width: 140px;
          font-size: 9px;
        }
        #hud-skillbar {
          bottom: 14px;
          gap: 6px;
        }
        .skill-slot {
          width: 48px;
          height: 48px;
        }
        .skill-slot .skill-icon {
          font-size: 20px;
        }
        .skill-slot .skill-name {
          font-size: 7px;
          max-width: 44px;
        }
        #hud-devour-btn {
          bottom: 14px;
          left: 14px;
          width: 52px;
          height: 52px;
        }
        #hud-devour-btn .devour-icon {
          font-size: 24px;
        }
        #hud-sanctum-btn {
          bottom: 14px;
          right: 14px;
          width: 40px;
          height: 40px;
          font-size: 18px;
        }
        #hud-voice {
          font-size: 13px;
          top: 50px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading">Summoning the Sanctum...</div>

      <!-- Top-Left: Health + Realm -->
      <div id="hud-topleft" class="hud-element" style="display:none;">
        <div id="hud-realm-info">
          <span class="depth-badge">D<span id="hud-depth">1</span></span>
          <span id="hud-realm">Verdant Rift</span>
        </div>
        <div id="hud-health-container">
          <div id="hud-health-bar">
            <div id="hud-health-fill" style="width:100%;"></div>
            <div id="hud-health-text">100/100</div>
          </div>
        </div>
      </div>

      <!-- Top-Right: Devour Progress -->
      <div id="hud-topright" class="hud-element" style="display:none;">
        <div id="hud-devour-count">
          <span class="devour-icon">✦</span>
          <span id="hud-devour-num">0</span> devoured
        </div>
        <div id="hud-unlocked">Force / Projectile / Ranged</div>
      </div>

      <!-- Top-Center: Voice of the World -->
      <div id="hud-voice" class="hud-element"></div>

      <!-- Debug Overlay (F3) -->
      <div id="hud-debug" class="hud-element">
        <div class="debug-row"><span class="debug-label">FPS</span><span id="hud-fps">--</span></div>
        <div class="debug-row"><span class="debug-label">Tile</span><span id="hud-tile">--, --</span></div>
        <div class="debug-row"><span class="debug-label">Pos</span><span id="hud-pixel">--, --</span></div>
        <div class="debug-row"><span class="debug-label">Enemies</span><span id="hud-enemies">--</span></div>
      </div>

      <!-- Bottom-Center: Skill Bar -->
      <div id="hud-skillbar" class="hud-element" style="display:none;">
        <div class="skill-slot" id="skill-slot-0">
          <span class="skill-key">1</span>
          <span class="skill-icon">✦</span>
          <span class="skill-name">--</span>
          <div class="cooldown-overlay" style="height:0%;"></div>
          <span class="cooldown-text"></span>
        </div>
        <div class="skill-slot" id="skill-slot-1">
          <span class="skill-key">2</span>
          <span class="skill-icon">✦</span>
          <span class="skill-name">--</span>
          <div class="cooldown-overlay" style="height:0%;"></div>
          <span class="cooldown-text"></span>
        </div>
        <div class="skill-slot" id="skill-slot-2">
          <span class="skill-key">3</span>
          <span class="skill-icon">✦</span>
          <span class="skill-name">--</span>
          <div class="cooldown-overlay" style="height:0%;"></div>
          <span class="cooldown-text"></span>
        </div>
        <div class="skill-slot" id="skill-slot-3">
          <span class="skill-key">4</span>
          <span class="skill-icon">✦</span>
          <span class="skill-name">--</span>
          <div class="cooldown-overlay" style="height:0%;"></div>
          <span class="cooldown-text"></span>
        </div>
      </div>

      <!-- Bottom-Left: Devour Button -->
      <div id="hud-devour-btn" class="hud-element" style="display:none;">
        <span class="devour-icon">🌀</span>
        <span class="devour-key">E</span>
        <div class="cooldown-overlay" style="height:0%;"></div>
        <span class="cooldown-text"></span>
      </div>

      <!-- Bottom-Right: Sanctum Button -->
      <div id="hud-sanctum-btn" class="hud-element" style="display:none;">
        🏛
        <span class="sanctum-key">R</span>
      </div>

      <!-- Death Screen -->
      <div id="hud-death" class="hud-element">
        <div class="death-text">YOU DIED</div>
        <div class="death-hint">Press <span class="key">R</span> to enter the Sanctum</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
